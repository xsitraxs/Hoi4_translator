name: Build Windows EXE

on:
  push:
    tags:
      - "v*" # Сработает при пуше тега, например v1.3.0
  workflow_dispatch: # Позволяет запустить сборку вручную

permissions:
  contents: write # Критически важно для загрузки файла в Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator pyinstaller aiohttp jpype1

      - name: Build EXE
        run: |
          # Умная сборка: проверяем наличие Java-модуля
          if (Test-Path "hoi_logic.jar") {
              Write-Host "Found hoi_logic.jar! Packaging with Java Support."
              pyinstaller --clean --onefile --noconsole --name "HOI4_Translator_PRO" --add-data "hoi_logic.jar;." hoi4_translator.py
          } else {
              Write-Host "No hoi_logic.jar found. Packaging Python only."
              pyinstaller --clean --onefile --noconsole --name "HOI4_Translator_PRO" hoi4_translator.py
          }
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HOI4_Translator_PRO.exe
          generate_release_notes: true # Автоматически создаст список изменений из коммитов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
