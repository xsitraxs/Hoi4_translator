name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install deep-translator pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "HOI4_Localisation_Translator" hoi4_translator.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HOI4_Localisation_Translator
          path: dist/HOI4_Localisation_Translator.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HOI4_Localisation_Translator.exe
          body: |
            ## HOI4 Localisation Translator

            ### Установка
            1. Скачай `HOI4_Localisation_Translator.exe`
            2. Запусти — Python не нужен

            ### Что нового
            См. коммиты.
