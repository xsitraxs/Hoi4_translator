name: Build Windows EXE

on:
  push:
    tags:
      - "v*"         # Срабатывает при пуше тега, например v1.3.0
  workflow_dispatch:  # Можно запустить вручную из вкладки Actions

permissions:
  contents: write     # Нужно для создания Release и загрузки файлов

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator aiohttp jpype1 pyinstaller

      - name: Build EXE
        run: |
          if (Test-Path "hoi_logic.jar") {
              Write-Host "Found hoi_logic.jar — building with Java support."
              pyinstaller `
                --clean `
                --onefile `
                --noconsole `
                --name "Hoi4_Translator" `
                --hidden-import="aiohttp" `
                --hidden-import="deep_translator" `
                --hidden-import="deep_translator.google_trans" `
                --hidden-import="deep_translator.mymemory_translator" `
                --hidden-import="deep_translator.deepl_translator" `
                --add-data "hoi_logic.jar;." `
                hoi4_translator.py
          } else {
              Write-Host "No hoi_logic.jar — building Python only."
              pyinstaller `
                --clean `
                --onefile `
                --noconsole `
                --name "Hoi4_Translator" `
                --hidden-import="aiohttp" `
                --hidden-import="deep_translator" `
                --hidden-import="deep_translator.google_trans" `
                --hidden-import="deep_translator.mymemory_translator" `
                --hidden-import="deep_translator.deepl_translator" `
                hoi4_translator.py
          }
        shell: pwsh

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hoi4_Translator
          path: dist/Hoi4_Translator.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Hoi4 Translator ${{ github.ref_name }}"
          body_path: RELEASE.md
          files: dist/Hoi4_Translator.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
