name: Build Windows EXE

on:
  push:
    tags:
      - "v*" # Сработает при пуше тега, например v1.1.0
  workflow_dispatch: # Позволяет запустить сборку вручную

permissions:
  contents: write # Критически важно для загрузки файла в Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator pyinstaller

      - name: Build EXE
        run: |
          # Сборка без иконки, одним файлом, без консоли
          pyinstaller --clean --onefile --noconsole --name "HOI4_Localisation_Translator" hoi4_translator.py

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HOI4_Localisation_Translator.exe
          generate_release_notes: true # Автоматически создаст список изменений из коммитов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
