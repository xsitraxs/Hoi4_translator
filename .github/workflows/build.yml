name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Добавляем права для создания релиза
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          # Добавил --clean и убрал возможные конфликты с путями
          pyinstaller --clean --onefile --noconsole --name "HOI4_Localisation_Translator" hoi4_translator.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HOI4_Localisation_Translator_Build
          path: dist/HOI4_Localisation_Translator.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HOI4_Localisation_Translator.exe
          # Можно добавить автоматическую генерацию описания из коммитов
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
